<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мобильная версия — KMK Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      gap: 20px;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 40px;
      border: 8px solid #2d2d44;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #3d3d55;
      background: #fff;
      position: relative;
    }
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 30px;
      background: #2d2d44;
      border-radius: 0 0 18px 18px;
      z-index: 10;
    }
    .phone-frame iframe {
      width: 390px;
      height: 844px;
      border: none;
    }
    .label {
      color: #8888aa;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="label">iPhone 14 Pro — 390 × 844</div>
  <div class="phone-frame">
    <iframe src="index.html" style="width: 390px; height: 844px;"></iframe>
  </div>
</body>
</html>
